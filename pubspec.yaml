name: salangi_ko_pu
description: Admin for Salangi Ko Pu

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  http: ^1.6.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  path_provider_windows: ^2.3.0
  open_file: ^3.5.11
  pdf: ^3.12.0
  file_picker: ^11.0.2
  excel: ^4.0.6
  csv: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/salangi.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/salangi.png"

  windows:
    generate: true
    image_path: "assets/salangi.png"
    icon_size: 256

flutter:
  uses-material-design: true

  assets:
    - assets/salangi.png